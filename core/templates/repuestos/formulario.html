{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if repuesto %}Editar{% else %}Nuevo{% endif %} Repuesto</title>
    <link rel="stylesheet" href="{% static 'css/diseño.css' %}">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Bike Assembly</h1>
        </div>
        <nav>
            <a href="{% url 'listar_repuestos' %}">Inventario</a>
        </nav>
    </header>

    <main class="container">
        <div class="form-container">
            <h1>{% if repuesto %}Modificar Repuesto{% else %}Registrar Componente{% endif %}</h1>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" name="nombre" value="{{ repuesto.nombre|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label>Categoría:</label>
                    <input type="text" name="categoria" value="{{ repuesto.categoria|default:'' }}" placeholder="Ej: Marco, Tensor" required>
                </div>

                <div class="form-group">
                    <label>Precio:</label>
                    <input type="number" step="0.01" name="precio" value="{{ repuesto.precio|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label>Stock:</label>
                    <input type="number" name="stock" value="{{ repuesto.stock|default:0 }}" required>
                </div>

                <div class="form-group">
                    <label>Compatibilidad:</label>
                    <select name="compatibilidad">
                        {% for valor, texto in choices %}
                            <option value="{{ valor }}" {% if repuesto.compatibilidad == valor %}selected{% endif %}>{{ texto }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Descripción:</label>
                    <textarea name="descripcion" rows="4">{{ repuesto.descripcion|default:'' }}</textarea>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-submit">Guardar</button>
                    <a href="{% url 'listar_repuestos' %}" class="btn-link-cancel">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Bike Assembly. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
