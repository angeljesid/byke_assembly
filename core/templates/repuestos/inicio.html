{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bike Assembly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/diseño.css' %}">
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-brand">
        <div class="d-flex justify-content-center">
            <div style="width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                <i class="bi bi-bicycle text-dark fs-4"></i>
            </div>
        </div>
        <h4 class="mb-0">Bike <span style="color: var(--nexora-gold);">Assembly</span></h4>
    </div>

    <ul class="sidebar-nav">
        <li class="nav-item">
            <a href="{% url 'dashboard' %}" class="nav-link-custom {% if seccion == 'home' %}active{% endif %}">
                <i class="bi bi-house-door"></i> Home
            </a>
        </li>
        <li class="nav-item">
            <a href="{% url 'listar_clientes' %}" class="nav-link-custom {% if seccion == 'clientes' %}active{% endif %}">
                <i class="bi bi-people"></i> Clientes
            </a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link-custom">
                <i class="bi bi-box-seam"></i> Productos
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <a href="#" class="nav-link-custom mb-2">
            <i class="bi bi-gear"></i> Configuración
        </a>
        <form action="{% url 'logout' %}" method="POST">
            {% csrf_token %}
            <button type="submit" class="logout-btn">
                <i class="bi bi-power"></i> Cerrar sesión
            </button>
        </form>
    </div>
</nav>

<div class="content-wrapper">
    <div class="container-fluid">
        <div class="card card-custom p-5 text-center">
            <h1 class="fw-bold">Bienvenido a Bike Assembly</h1>
            <p class="text-muted">Selecciona una opción en el menú lateral para comenzar a gestionar tu sistema.</p>
            <div class="mt-4">
                <i class="bi bi-bicycle" style="font-size: 4rem; color: var(--nexora-blue);"></i>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
